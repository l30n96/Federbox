<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2E6B4A" />
<title>Federbox · Vogelstimmen lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FEDERBOX — Designsystem
   Palette: "Morgenchor" — Dämmerung im Mischwald.
   Kühles Morgennebel-Salbei statt Creme, Kiefern-Tinte statt
   Schwarz, Waldgrün als Aktion, Morgengold als "gemeistert".
   ============================================================ */
:root{
  --bg:#E7EEE6; --bg-2:#DDE7DB; --surface:#FBFCFA; --surface-2:#F1F5F0;
  --ink:#16241C; --ink-2:#46554B; --ink-3:#7B897F; --line:#D4DED2;
  --primary:#2E6B4A; --primary-2:#23533A; --primary-soft:#DBEADF;
  --gold:#CE9233; --gold-soft:#F4E6C9; --robin:#BC4F36;
  --b1:#A7B8AA; --b2:#86AC90; --b3:#5E9E72; --b4:#3B8A59; --b5:#CE9233;
  --shadow:0 1px 2px rgba(22,36,28,.05), 0 8px 24px -12px rgba(22,36,28,.18);
  --shadow-lg:0 2px 6px rgba(22,36,28,.06), 0 24px 60px -24px rgba(22,36,28,.30);
  --r:14px; --r-lg:22px; --r-sm:9px;
  --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--ink); line-height:1.5;
  background:
    radial-gradient(900px 500px at 88% -8%, #EFF4ED 0%, transparent 60%),
    radial-gradient(700px 600px at -5% 8%, #E2ECE1 0%, transparent 55%),
    var(--bg);
  min-height:100dvh; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}
h1,h2,h3{margin:0;font-family:var(--display);font-weight:500;letter-spacing:-.01em;line-height:1.1}
a{color:var(--primary)}
::selection{background:var(--gold-soft)}

/* ---------- Layout shell ---------- */
.shell{max-width:1080px;margin:0 auto;padding:0 20px 120px}
.topbar{
  position:sticky;top:0;z-index:40;backdrop-filter:saturate(1.1) blur(10px);
  background:linear-gradient(var(--bg), rgba(231,238,230,.78));
  border-bottom:1px solid var(--line);
}
.topbar-in{max-width:1080px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.02em}
.brand .mark{width:30px;height:30px;flex:0 0 auto}
.nav{display:flex;gap:2px;margin-left:6px}
.nav button{
  padding:8px 13px;border-radius:999px;font-size:14px;font-weight:500;color:var(--ink-2);
  transition:background .15s,color .15s;
}
.nav button:hover{background:var(--surface-2)}
.nav button.active{background:var(--ink);color:#fff}
.spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  padding:10px 16px;border-radius:999px;font-weight:600;font-size:14px;
  background:var(--primary);color:#fff;transition:transform .12s,background .15s,box-shadow .15s;
  box-shadow:0 1px 2px rgba(22,36,28,.12);
}
.btn:hover{background:var(--primary-2)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.ghost:hover{background:var(--surface-2)}
.btn.gold{background:var(--gold);color:#3a2a08}
.btn.gold:hover{background:#bb8329}
.btn.danger{background:var(--surface);color:var(--robin);border:1px solid #E6CcC4}
.btn.sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.5;pointer-events:none}

/* ---------- mobile nav ---------- */
.menu-toggle{display:none}
@media(max-width:720px){
  /* backdrop-filter würde ein Containing Block für die fixe Bottom-Nav bilden */
  .topbar{backdrop-filter:none;background:rgba(231,238,230,.96)}
  .nav{
    position:fixed;left:0;right:0;bottom:0;z-index:50;margin:0;gap:0;
    background:var(--surface);border-top:1px solid var(--line);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom)); justify-content:space-around;
    box-shadow:0 -8px 24px -16px rgba(22,36,28,.4);
  }
  .nav button{flex:1;border-radius:12px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px}
  .nav button.active{background:var(--primary-soft);color:var(--primary-2)}
  .nav .nav-ic{width:21px;height:21px}
  .topbar-cta{display:none}
}
.nav-ic{width:0;height:0}
@media(min-width:721px){ .nav-ic{display:none} }

/* ---------- Cards / generic ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.muted{color:var(--ink-2)}
.faint{color:var(--ink-3)}
.la{font-family:var(--mono);font-size:12px;color:var(--ink-3);font-style:normal}
.section-title{font-size:13px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:30px 2px 14px}

/* ---------- Dashboard ---------- */
.hero{margin:34px 0 8px;position:relative}
.hero h1{font-size:clamp(34px,6vw,56px);font-weight:400}
.hero h1 b{font-weight:600;font-style:italic;color:var(--primary)}
.hero .lead{font-size:clamp(17px,2.4vw,21px);color:var(--ink-2);margin-top:12px;max-width:46ch}
.hero .lead .num{font-weight:600;color:var(--ink);font-family:var(--display);font-style:italic}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
.hero .btn{padding:13px 22px;font-size:15px}

/* Karteikasten — die fünf Boxen */
.kasten{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:26px 0 6px}
.box{
  position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 12px 13px;overflow:hidden;text-align:left;transition:transform .12s,box-shadow .15s;
}
.box:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.box .lid{position:absolute;left:0;top:0;height:5px;width:100%}
.box .bn{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.08em}
.box .cnt{font-family:var(--display);font-size:30px;font-weight:500;line-height:1;margin-top:8px}
.box .bl{font-size:11.5px;color:var(--ink-3);margin-top:3px}
@media(max-width:720px){ .kasten{grid-template-columns:repeat(5,1fr);gap:6px} .box{padding:11px 8px} .box .cnt{font-size:22px} .box .bl{display:none} }

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.stat{padding:16px 16px 15px}
.stat .v{font-family:var(--display);font-size:28px;font-weight:500;line-height:1}
.stat .k{font-size:12.5px;color:var(--ink-3);margin-top:5px}
@media(max-width:560px){ .stats{grid-template-columns:repeat(2,1fr)} }

/* ---------- Collection grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.bird{
  text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow);transition:transform .12s,box-shadow .15s;display:flex;flex-direction:column
}
.bird:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.bird .ph{aspect-ratio:4/3;background:var(--surface-2);position:relative;overflow:hidden}
.bird .ph img{width:100%;height:100%;object-fit:cover;display:block}
.bird .ph .noimg{position:absolute;inset:0;display:grid;place-items:center;color:var(--ink-3)}
.bird .meta{padding:11px 13px 13px}
.bird .dn{font-family:var(--display);font-size:17px;font-weight:500;line-height:1.15}
.bird .ph .badge{position:absolute;top:8px;right:8px;background:rgba(251,252,250,.92);backdrop-filter:blur(4px);
  border-radius:999px;padding:3px 9px;font-family:var(--mono);font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:999px;display:inline-block}
.bird .snd{position:absolute;bottom:8px;left:8px;width:30px;height:30px;border-radius:999px;background:rgba(22,36,28,.62);
  color:#fff;display:grid;place-items:center;backdrop-filter:blur(2px)}
.bird.pending-bird{opacity:.75;pointer-events:none;border-style:dashed;border-color:var(--gold)}

/* ---------- Sets ---------- */
.setlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.setcard{padding:18px;display:flex;flex-direction:column;gap:14px}
.setcard h3{font-size:21px}
.setcard .sub{font-size:13px;color:var(--ink-2)}
.bar{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;display:flex}
.bar span{height:100%}
.setcard .row{display:flex;gap:8px;margin-top:auto}

/* ---------- Add view ---------- */
.tabs{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;margin:6px 0 22px}
.tabs button{padding:8px 16px;border-radius:999px;font-size:13.5px;font-weight:600;color:var(--ink-2)}
.tabs button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.field{display:flex;gap:10px;align-items:center}
.input{
  width:100%;padding:13px 15px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface);
  font-size:16px;transition:border .15s,box-shadow .15s;outline:none
}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
label.lbl{font-size:12.5px;font-weight:600;color:var(--ink-2);margin:14px 0 6px;display:block}
.results{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.res{display:flex;gap:14px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
.res .th{width:64px;height:64px;border-radius:10px;object-fit:cover;background:var(--surface-2);flex:0 0 auto}
.res .info{flex:1;min-width:0}
.res .info .t{font-family:var(--display);font-size:17px;font-weight:500}
.res .info .x{font-size:12.5px;color:var(--ink-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:2px}

/* ---------- Spectrogram / player ---------- */
.spectro{display:flex;align-items:flex-end;gap:3px;height:46px}
.spectro i{flex:1;background:linear-gradient(var(--primary),var(--b3));border-radius:3px;height:18%;transition:height .09s linear;opacity:.85}
.spectro.idle i{background:var(--line)}
.player{display:flex;align-items:center;gap:14px}
.playbtn{width:54px;height:54px;border-radius:999px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:0 0 auto;box-shadow:0 6px 18px -6px rgba(46,107,74,.6)}
.playbtn.lg{width:66px;height:66px}
.playbtn:active{transform:scale(.96)}
.recmeta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}

/* ---------- Study ---------- */
.study{max-width:560px;margin:24px auto 0}
.study .progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.study .progress .track{flex:1;height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.study .progress .track i{display:block;height:100%;background:var(--primary);transition:width .3s}
.study .progress .lab{font-family:var(--mono);font-size:12px;color:var(--ink-3)}
.qcard{padding:22px;text-align:center}
.qcard .qimg{width:100%;aspect-ratio:5/3;object-fit:cover;border-radius:var(--r);background:var(--surface-2);margin-bottom:18px}
.qcard .qimg.hidden{display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-family:var(--mono);font-size:13px}
.qname{font-family:var(--display);font-size:30px;font-weight:500;margin:6px 0}
.qname.reveal{color:var(--primary)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.choice{padding:15px 14px;min-height:54px;display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--line);border-radius:var(--r);background:var(--surface);font-size:16px;font-weight:500;
  font-family:var(--display);transition:border .12s,background .12s,transform .1s;text-align:center}
.choice:hover{border-color:var(--primary)}
.choice:active{transform:scale(.97)}
@media(max-width:460px){ .choices{grid-template-columns:1fr} .choice{min-height:56px;font-size:17px} }
.choice.correct{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-2)}
.choice.wrong{border-color:var(--robin);background:#F6E4DF;color:var(--robin)}
.choice .num{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-right:8px}
.gradebtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.modeselect{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.mode{padding:18px;text-align:left;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);transition:transform .12s,box-shadow .15s,border .15s}
.mode:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary)}
.mode .mt{font-family:var(--display);font-size:19px;font-weight:500;margin-bottom:4px}
.mode .md{font-size:13px;color:var(--ink-2)}
.mode .mi{font-size:22px;margin-bottom:8px;display:block}
.endcard{padding:30px 24px;text-align:center}
.endcard .big{font-family:var(--display);font-size:46px;font-weight:500;color:var(--primary)}
.fb{font-family:var(--display);font-size:18px;font-weight:500;margin-top:14px;min-height:24px}
.fb.ok{color:var(--primary)} .fb.no{color:var(--robin)}
.nextbtn{margin-top:16px;padding:11px 24px;border-radius:999px;background:var(--primary);color:#fff;font-weight:600;font-size:14px;box-shadow:0 1px 2px rgba(22,36,28,.12);transition:transform .12s,background .15s}
.nextbtn:hover{background:var(--primary-2)}
.nextbtn:active{transform:translateY(1px)}

/* ---------- Modal ---------- */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(22,36,28,.42);backdrop-filter:blur(3px);
  display:grid;place-items:center;padding:18px;animation:fade .18s ease}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);max-width:560px;width:100%;
  max-height:88dvh;overflow:auto;animation:pop .2s cubic-bezier(.2,.8,.3,1)}
@media(max-width:560px){
  .scrim{padding:0;align-items:end;place-items:end stretch}
  .modal{max-width:none;border-radius:var(--r-lg) var(--r-lg) 0 0;max-height:92dvh;animation:sheet .28s cubic-bezier(.2,.8,.3,1)}
  .modal .mbody{padding:18px 18px calc(18px + env(safe-area-inset-bottom))}
}
@keyframes sheet{from{transform:translateY(48px);opacity:.5}to{transform:none;opacity:1}}
.modal .mhead{position:relative}
.modal .mhead img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.modal .mbody{padding:22px}
.modal .close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:999px;background:rgba(251,252,250,.92);
  display:grid;place-items:center;backdrop-filter:blur(4px);box-shadow:var(--shadow)}
/* Image carousel */
.carousel{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--surface-2)}
.carousel img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;opacity:0;transition:opacity .3s}
.carousel img.active{opacity:1;position:relative}
.carousel .arr{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:999px;
  background:rgba(251,252,250,.88);backdrop-filter:blur(4px);display:grid;place-items:center;
  box-shadow:var(--shadow);font-size:16px;z-index:2;opacity:0;transition:opacity .2s}
.carousel:hover .arr{opacity:1}
.carousel .arr.l{left:10px}
.carousel .arr.r{right:10px}
.carousel .dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.carousel .dots i{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.5);transition:background .2s}
.carousel .dots i.active{background:#fff}
.reclist{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.recrow{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface-2)}
.recrow .rp{width:40px;height:40px;border-radius:999px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:0 0 auto}
.boxctl{display:flex;gap:6px;align-items:center}
.boxctl button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface);font-weight:600}
.boxctl .cur{font-family:var(--mono);font-size:13px;min-width:60px;text-align:center}
.chk{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer}
.chk:hover{background:var(--surface-2)}
.chk input{width:17px;height:17px;accent-color:var(--primary)}

/* ---------- empty / toast / misc ---------- */
.empty{text-align:center;padding:54px 20px;border:1.5px dashed var(--line);border-radius:var(--r-lg);background:var(--surface-2)}
.empty .ei{font-size:40px}
.empty h3{font-size:24px;margin:14px 0 6px}
.empty p{color:var(--ink-2);max-width:42ch;margin:0 auto 18px}
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:90vw}
@media(max-width:720px){ #toasts{bottom:84px} }
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);animation:pop .2s}
.toast.gold{background:var(--gold);color:#3a2a08}
.spin{width:18px;height:18px;border:2.5px solid var(--primary-soft);border-top-color:var(--primary);border-radius:99px;animation:rot .7s linear infinite;display:inline-block}
.center{display:grid;place-items:center;padding:50px;color:var(--ink-3);gap:12px;font-size:14px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2)}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
/* ---------- Gamification ---------- */
.gamebar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:20px}
.statpill{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow)}
.statpill .ic{font-size:15px}
.statpill.flame{border-color:#EAC9A8;background:#FBF3E6;color:#9a5b1d}
.statpill.lvl{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-2)}
.xpwrap{flex:1;min-width:150px;max-width:260px}
.xpbar{height:8px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--b3),var(--gold));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.3,1)}
.xplab{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:4px;display:flex;justify-content:space-between}
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.badge-c{padding:14px 10px;text-align:center}
.badge-c.locked{opacity:.45;filter:grayscale(1)}
.badge-c .bi{font-size:28px}
.badge-c .bt{font-size:13px;font-weight:600;margin-top:6px}
.badge-c .bd{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.combo-pop{position:fixed;left:50%;top:32%;z-index:90;font-family:var(--display);font-weight:600;font-size:30px;color:var(--gold);
  text-shadow:0 2px 14px rgba(206,146,51,.45);pointer-events:none;animation:comboUp .95s ease forwards}
@keyframes comboUp{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-100%) scale(1)}}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:95;overflow:hidden}
.confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(106vh) rotate(720deg);opacity:.9}}
.qcard.shake{animation:shake .42s}

<script>
"use strict";
/* ============================================================
   1. KLEINE HELFER
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = ()=> Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const DAY = 86400000;
const BOX_COLORS = ['','--b1','--b2','--b3','--b4','--b5'];
const BOX_NAMES = ['','Neu','Im Blick','Fast da','Sitzt','Gemeistert'];
function bc(box){ return getComputedStyle(document.documentElement).getPropertyValue(BOX_COLORS[box]).trim(); }

function toast(msg, gold=false){
  const t=document.createElement('div'); t.className='toast'+(gold?' gold':''); t.textContent=msg;
  $('#toasts').appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)}, 2400);
}

/* ============================================================
   2. INDEXEDDB — alle Daten lokal im Browser
   ============================================================ */
const DB = (()=>{
  let db=null;
  function open(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open('federbox',1);
      r.onupgradeneeded=e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains('birds')) d.createObjectStore('birds',{keyPath:'id'});
        if(!d.objectStoreNames.contains('sets'))  d.createObjectStore('sets', {keyPath:'id'});
      };
      r.onsuccess=e=>{db=e.target.result;res()};
      r.onerror=e=>rej(e.target.error);
    });
  }
  function tx(store,mode='readonly'){ return db.transaction(store,mode).objectStore(store); }
  const all = store => new Promise((res,rej)=>{const o=tx(store).getAll();o.onsuccess=()=>res(o.result||[]);o.onerror=()=>rej(o.error)});
  const put = (store,v) => new Promise((res,rej)=>{const o=tx(store,'readwrite').put(v);o.onsuccess=()=>res(v);o.onerror=()=>rej(o.error)});
  const del = (store,k) => new Promise((res,rej)=>{const o=tx(store,'readwrite').delete(k);o.onsuccess=()=>res();o.onerror=()=>rej(o.error)});
  const clear = store => new Promise((res,rej)=>{const o=tx(store,'readwrite').clear();o.onsuccess=()=>res();o.onerror=()=>rej(o.error)});
  return {open,all,put,del,clear};
})();

/* ============================================================
   3. API-SCHICHT — über den eigenen Proxy (/api/proxy)
   Bilder & Audio laden direkt (kein CORS nötig).
   ============================================================ */
const PROXY = '/api/proxy';
const BIRDS_API = '/api/birds';
let backendOk = null; // null=unbekannt

async function px(service, params){
  // Check rate limit before making a call
  if(!apiLimiter.canCall(service)){
    console.warn(`Rate limit erreicht für ${service}, warte…`);
    await apiLimiter.waitForSlot(service);
  }
  apiLimiter.track(service);
  const u = new URL(PROXY, location.origin);
  u.searchParams.set('service', service);
  for(const [k,v] of Object.entries(params)) u.searchParams.set(k, v);
  const r = await fetch(u);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ---- API Rate Limiter ----
// Tracks calls per service per minute to avoid hitting upstream limits.
// Xeno-canto is more restrictive than Wikipedia, so lower budget.
const apiLimiter = (function(){
  const budgets = { xc: 10, wiki: 25, wiki_en: 25, wikidata: 30, commons: 20 };
  const windowMs = 60_000; // 1 minute window
  const calls = {}; // service → [timestamps]

  function cleanup(service){
    const now = Date.now();
    if(!calls[service]) calls[service] = [];
    calls[service] = calls[service].filter(t => now - t < windowMs);
  }

  return {
    canCall(service){
      cleanup(service);
      const limit = budgets[service] || 20;
      return calls[service].length < limit;
    },
    track(service){
      if(!calls[service]) calls[service] = [];
      calls[service].push(Date.now());
    },
    remaining(service){
      cleanup(service);
      const limit = budgets[service] || 20;
      return Math.max(0, limit - (calls[service]||[]).length);
    },
    async waitForSlot(service, timeout){
      // Wait until oldest call expires from window
      const maxWait = timeout || 30_000;
      const start = Date.now();
      while(!this.canCall(service)){
        if(Date.now()-start > maxWait) throw new Error('Rate limit timeout');
        await new Promise(r=>setTimeout(r, 1000));
      }
    }
  };
})();

// ---- Bird Profile Cache ----
// Batch-fetch cached bird profiles by German name from the server.
// Returns a Map: name → profile (only for cache hits).
async function fetchCachedBirds(names){
  const map = new Map();
  if(!names.length) return map;
  try{
    const u = new URL(BIRDS_API, location.origin);
    u.searchParams.set('action','get');
    u.searchParams.set('names', names.join(','));
    const r = await fetch(u);
    if(!r.ok) return map;
    const data = await r.json();
    if(data.birds){
      for(const [name,profile] of Object.entries(data.birds)){
        map.set(name.toLowerCase(), profile);
      }
    }
  }catch(e){ console.warn('Bird-Cache nicht erreichbar:', e); }
  return map;
}

// Store enriched bird profile(s) in the server cache (fire-and-forget).
function cacheBirdProfiles(birds){
  const payload = birds.filter(b=>b&&b.de).map(b=>({
    de:b.de, la:b.la||null, en:b.en||null,
    image:b.image||null, sounds:b.sounds||[], wiki:b.wiki||null
  }));
  if(!payload.length) return;
  fetch(new URL(BIRDS_API+'?action=put', location.origin), {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birds:payload})
  }).catch(()=>{});
}

// Create a full bird object from a cached profile.
function birdFromCache(profile){
  return {
    id:uid(), de:profile.de, la:profile.la, en:profile.en,
    image:profile.image, sounds:profile.sounds||[],
    wiki:profile.wiki,
    box:1, due:0, correct:0, wrong:0, lastReviewed:0, created:Date.now()
  };
}

// Create a pending bird placeholder — shown immediately while enrichment runs in background.
function birdPending(name){
  return {
    id:uid(), de:name, la:null, en:null,
    image:null, sounds:[],
    wiki:null, pending:true,
    box:1, due:0, correct:0, wrong:0, lastReviewed:0, created:Date.now()
  };
}

// ---- Background Enrichment Queue ----
// Enriches pending birds in the background without blocking the UI.
let _enrichQueue = [];
let _enrichRunning = false;

async function enqueueEnrichment(birds){
  _enrichQueue.push(...birds);
  if(!_enrichRunning) _runEnrichQueue();
}

async function _runEnrichQueue(){
  if(_enrichRunning) return;
  _enrichRunning = true;
  let enriched = 0;
  const maxRetries = 3;
  const retryCount = new Map(); // id → attempts

  // Batch cache lookup: collect all pending bird names and check server cache first
  const pendingNames = _enrichQueue
    .map(b => b.de)
    .filter(Boolean);
  const cachedProfiles = pendingNames.length ? await fetchCachedBirds(pendingNames) : new Map();

  while(_enrichQueue.length){
    const b = _enrichQueue.shift();
    // Skip if bird was removed or already enriched
    const current = state.birds.find(x=>x.id===b.id);
    if(!current || !current.pending) continue;
    // Check shared server cache first — avoids API calls entirely
    const cached = cachedProfiles.get((b.de||'').toLowerCase());
    if(cached && cached.de){
      current.la=cached.la; current.en=cached.en; current.image=cached.image;
      current.sounds=cached.sounds||[]; current.wiki=cached.wiki;
      current.pending=false;
      await DB.put('birds', current);
      enriched++;
      continue;
    }

    // Respect rate limits — wait until budget available for ALL services
    // Each bird needs: wiki (search) + wikidata (filter+enrich) + xc (sounds)
    const maxWait = 90_000;
    const waitStart = Date.now();
    while(!apiLimiter.canCall('wiki') || !apiLimiter.canCall('wikidata') || !apiLimiter.canCall('xc')){
      if(Date.now()-waitStart > maxWait) break;
      await new Promise(r=>setTimeout(r, 3000));
    }
    try{
      // Longer delay between birds to stay well within rate limits
      await _throttleDelay(1200);
      const cands = await searchBirds(SEARCH_TERM[b.de]||b.de);
      const fresh = await enrichFirstSpecies(cands);
      if(fresh){
        current.la=fresh.la; current.en=fresh.en; current.image=fresh.image;
        current.sounds=fresh.sounds; current.wiki=fresh.wiki;
        current.pending=false;
        await DB.put('birds', current);
        cacheBirdProfiles([current]);
        enriched++;
      } else {
        current.pending=false;
        await DB.put('birds', current);
      }
    }catch(e){
      console.warn('Hintergrund-Anreicherung fehlgeschlagen für', b.de, e);
      const attempts = (retryCount.get(b.id)||0) + 1;
      retryCount.set(b.id, attempts);
      if(attempts <= maxRetries){
        // Re-queue at end so other birds can proceed; wait longer on retry
        _enrichQueue.push(b);
        await new Promise(r=>setTimeout(r, 5000 * attempts));
      } else {
        // Give up after max retries — mark as no longer pending
        current.pending=false;
        await DB.put('birds', current);
        await new Promise(r=>setTimeout(r, 2000));
      }
    }
  }
  _enrichRunning = false;
  if(enriched){
    toast(`🐦 ${enriched} ${enriched===1?'Vogel wurde':'Vögel wurden'} erfolgreich angereichert!`, true);
    if(state.view==='collection'||state.view==='dashboard') render();
  }
}

// Throttle helper: wait between sequential API-heavy operations to avoid 429.
const _throttleDelay = ms => new Promise(r => setTimeout(r, ms));


// Kandidaten über die deutsche Wikipedia suchen.
// hastemplate:"Taxobox" beschränkt die Treffer auf Arten-Artikel,
// damit keine Personen, Orte o.ä. auftauchen (z.B. bei „Kuckuck“).
async function searchBirds(term){
  const data = await px('wiki', {
    action:'query', generator:'search', gsrsearch:`${term} hastemplate:"Taxobox"`, gsrlimit:12, gsrnamespace:0,
    prop:'pageimages|pageprops|extracts', piprop:'thumbnail', pithumbsize:480,
    exintro:1, explaintext:1, exsentences:2, exlimit:'max'
  });
  const pages = data?.query?.pages ? Object.values(data.query.pages) : [];
  pages.sort((a,b)=>(a.index??99)-(b.index??99));
  const cands = pages
    .filter(p=>!(p.pageprops && 'disambiguation' in p.pageprops)) // BKL-Seiten (z.B. „Star“) aussortieren
    .map(p=>({
      title:p.title, qid:p.pageprops?.wikibase_item||null,
      image:p.thumbnail?.source||null, extract:p.extract||''
    }));

  // Nur echte Vögel (Aves) auf Artniveau behalten.
  // Prüfung über Wikidata: Vogelspezifische Properties (eBird, IOC)
  // und Taxon-Rang = Art (Q7432) oder Unterart (Q68947).
  return filterBirds(cands);
}

// Dient als schnelle Vorab-Validierung: nur Kandidaten, deren Gattung hier

// Vogelfilter: prüft ob Kandidaten tatsächlich Vögel auf Artniveau sind.
// Primär über die Gattungsliste, sekundär über Wikidata-Properties.
async function filterBirds(cands){
  const withQid = cands.filter(c=>c.qid);
  if(!withQid.length) return [];
  const qids = [...new Set(withQid.map(c=>c.qid))];
  try{
    const wd = await px('wikidata',{
      action:'wbgetentities', ids:qids.join('|'),
      props:'claims', languages:'en'
    });
    const entities = wd?.entities || {};
    const validQids = new Set();
    for(const qid of qids){
      const ent = entities[qid];
      if(!ent || !ent.claims) continue;
      // Wissenschaftlichen Namen holen (P225) und Gattung gegen Liste prüfen
      const sciName = ent.claims.P225?.[0]?.mainsnak?.datavalue?.value;
      const genus = sciName ? sciName.trim().split(/\s+/)[0] : null;
      const genusMatch = genus && BIRD_GENERA.has(genus);
      // Vogelspezifische Properties: P3444 (eBird), P4526 (IOC), P10243 (Avibase)
      const propMatch = !!(ent.claims.P3444 || ent.claims.P4526 || ent.claims.P10243);
      // Kandidat muss entweder in der Gattungsliste ODER vogelspezifische Properties haben
      if(!genusMatch && !propMatch) continue;
      // Taxon-Rang prüfen (P105): Q7432=Art, Q68947=Unterart
      const rank = ent.claims.P105?.[0]?.mainsnak?.datavalue?.value?.id;
      if(rank && rank!=='Q7432' && rank!=='Q68947') continue;
      validQids.add(qid);
    }
    return cands.filter(c => c.qid && validQids.has(c.qid));
  }catch(e){
    // Bei Fehler: Gattungsliste als Fallback nutzen (statt alles durchzulassen)
    // Wir können zwar den wiss. Namen nicht prüfen, aber lieber nichts zeigen
    // als falsche Treffer — der Nutzer kann es erneut versuchen.
    console.warn('filterBirds: Wikidata-Abfrage fehlgeschlagen', e);
    return [];
  }
}

// Klammerzusatz aus Wikipedia-Titeln entfernen: „Star (Art)“ → „Star“
function cleanTitle(t){ return String(t||'').replace(/\s*\([^)]*\)\s*$/,'').trim(); }

// Einen Kandidaten anreichern: wiss. Name (Wikidata) + Laute (Xeno-canto)
async function enrichBird(cand){
  let la=null, en=null, de=cleanTitle(cand.title), image=cand.image;
  if(cand.qid){
    try{
      const wd = await px('wikidata',{action:'wbgetentities',ids:cand.qid,props:'labels|claims',languages:'de|en'});
      const ent = wd?.entities?.[cand.qid];
      if(ent){
        en = ent.labels?.en?.value || null;
        const p225 = ent.claims?.P225?.[0]?.mainsnak?.datavalue?.value;
        // Nur vollständige Artnamen übernehmen (Gattung + Epitheton),
        // z.B. „Sitta europaea" – reine Gattungsnamen wie „Sitta" ignorieren.
        if(p225 && p225.trim().split(/\s+/).length >= 2) la = p225;
        // Deutscher Name: der Wikipedia-Titel ist verlässlich deutsch. Das
        // Wikidata-Label ist bei Taxa oft nur der wissenschaftliche Name –
        // es dient nur als Ersatz, falls der Titel selbst wissenschaftlich ist.
        const label = ent.labels?.de?.value;
        if(la && de.toLowerCase()===la.toLowerCase() && label && label.toLowerCase()!==la.toLowerCase()){
          de = cleanTitle(label);
        }
        if(!image){
          const p18 = ent.claims?.P18?.[0]?.mainsnak?.datavalue?.value;
          if(p18) image = 'https://commons.wikimedia.org/wiki/Special:FilePath/'+encodeURIComponent(p18)+'?width=520';
        }
      }
    }catch(e){/* weiter ohne Wikidata */}
  }
  const sounds = await fetchSounds({la,en});
  return {
    id:uid(), de, la, en, image, sounds,
    wiki:'https://de.wikipedia.org/wiki/'+encodeURIComponent(cand.title.replace(/ /g,'_')),
    box:1, due:0, correct:0, wrong:0, lastReviewed:0, created:Date.now()
  };
}

function qScore(r){const o={A:0,B:1,C:2,D:3,E:4};const q=o[r.q]??5;const song=/song|gesang/i.test(r.type||'')?0:1;return q*2+song;}
async function fetchSounds({la,en}, limit=3){
  let query=null;
  if(la){ const parts=la.trim().split(/\s+/); if(parts.length>=2) query=`gen:"${parts[0]}" sp:"${parts[1]}"`; }
  if(!query && en) query=`en:"${en}"`;
  if(!query) return [];
  try{
    const data = await px('xc',{query, per_page: Math.min(limit+2, 10)});
    const recs = (data?.recordings)||[];
    return recs.sort((a,b)=>qScore(a)-qScore(b)).slice(0,limit).map(r=>({
      id:r.id,
      url:(r.file&&String(r.file).startsWith('http'))?r.file:`https://xeno-canto.org/${r.id}/download`,
      type:r.type||'', q:r.q||'', loc:r.loc||'', rec:r.rec||'', length:r.length||r.lengthMin||''
    }));
  }catch(e){ return []; }
}

async function pingBackend(){
  try{ await px('wiki',{action:'query',meta:'siteinfo',siprop:'general'}); backendOk=true; }
  catch(e){ backendOk=false; }
  return backendOk;
}

// Stimmen automatisch nachladen — der Nutzer muss nichts tun.
// Respektiert API-Limits: stoppt sobald Budget aufgebraucht.
let soundSyncRunning=false;
async function autoSyncSounds(){
  if(soundSyncRunning || backendOk===false) return;
  const missing = state.birds.filter(b=>(!b.sounds||!b.sounds.length)&&(b.la||b.en));
  if(!missing.length) return;
  soundSyncRunning=true;
  let loaded=0;
  for(const b of missing){
    // Stop if xeno-canto budget is low
    if(!apiLimiter.canCall('xc')){ break; }
    try{
      const sounds=await fetchSounds({la:b.la,en:b.en}, 3);
      if(sounds.length){ b.sounds=sounds; await DB.put('birds',b); loaded++; }
    }catch(e){ console.warn('Stimmen-Sync abgebrochen:',e); break; }
  }
  soundSyncRunning=false;
  if(loaded){
    toast(`🎶 Stimmen für ${loaded} ${loaded===1?'Vogel':'Vögel'} automatisch geladen.`);
    if(state.view==='collection'||state.view==='dashboard') render();
  }
}

// Bereits gespeicherte Vögel reparieren:
//  - falscher deutscher Name (wiss. Name gespeichert) → aus dem Wikipedia-Link rekonstruieren
//  - kaputte Einträge ohne Art & Bild (z.B. „Star“ über die BKL-Seite) → neu nachschlagen
let repairRunning=false;
async function repairBirds(){
  if(repairRunning) return;
  repairRunning=true;
  let fixed=0;
  for(const b of state.birds){
    try{
      if(b.la && b.de && b.de.toLowerCase()===b.la.toLowerCase() && b.wiki){
        const title=cleanTitle(decodeURIComponent(String(b.wiki).split('/wiki/')[1]||'').replace(/_/g,' '));
        if(title && title.toLowerCase()!==b.la.toLowerCase()){
          b.de=title; await DB.put('birds',b); fixed++; continue;
        }
      }
      if(!b.la && !b.image && backendOk){
        const cands=await searchBirds(SEARCH_TERM[b.de]||b.de);
        const fresh=await enrichFirstSpecies(cands);
        if(fresh && fresh.la){
          b.de=fresh.de; b.la=fresh.la; b.en=fresh.en; b.image=fresh.image; b.wiki=fresh.wiki;
          if(!b.sounds||!b.sounds.length) b.sounds=fresh.sounds;
          await DB.put('birds',b); fixed++;
        }
      }
    }catch(e){ console.warn('Reparatur übersprungen:',e); }
  }
  repairRunning=false;
  if(fixed){
    toast(`🛠️ ${fixed} ${fixed===1?'Eintrag':'Einträge'} automatisch korrigiert.`);
    if(state.view==='collection'||state.view==='dashboard') render();
  }
}

/* ============================================================
   4. LEITNER-LOGIK (5 Boxen)
   ============================================================ */
const INTERVAL = {1:1,2:2,3:4,4:8,5:16}; // Tage bis wieder fällig (nach richtiger Antwort)
function isDue(b){ return (b.due||0) <= Date.now(); }
function grade(b, correct){
  const before=b.box||1;
  if(correct){ b.box=Math.min(5,(b.box||1)+1); b.correct=(b.correct||0)+1; b.due=Date.now()+INTERVAL[b.box]*DAY; }
  else { b.box=1; b.wrong=(b.wrong||0)+1; b.due=Date.now()+6*3600*1000; }
  b.lastReviewed=Date.now();
  return {before, after:b.box, mastered:(correct && b.box===5 && before<5)};
}

/* ============================================================
   4b. GAMIFICATION — XP, Level, Streak, Abzeichen
   ============================================================ */
const GAME_KEY='federbox.game';
const LEVEL_NAMES=['','Eierschale','Nestling','Ästling','Pieper','Singvogel','Spottdrossel','Adlerauge','Eulen-Weisheit','Meistervogel','Vogelflüsterer'];
function xpForLevel(l){ return 40*l*l; } // kumulative XP-Schwelle für Level l
const game = (()=>{
  try{ const g=JSON.parse(localStorage.getItem(GAME_KEY)||'{}');
    return {xp:g.xp||0,streak:g.streak||0,lastDay:g.lastDay||'',best:g.best||0,sessions:g.sessions||0,badges:g.badges||[],maxCombo:g.maxCombo||0,combo:0};
  }catch(e){ return {xp:0,streak:0,lastDay:'',best:0,sessions:0,badges:[],maxCombo:0,combo:0}; }
})();
function saveGame(){ try{ localStorage.setItem(GAME_KEY,JSON.stringify({xp:game.xp,streak:game.streak,lastDay:game.lastDay,best:game.best,sessions:game.sessions,badges:game.badges,maxCombo:game.maxCombo})); }catch(e){} }
function gameLevel(){ let l=1; while(l<LEVEL_NAMES.length-1 && game.xp>=xpForLevel(l)) l++; return l; }
function touchStreak(){
  const today=new Date().toDateString();
  if(game.lastDay===today) return;
  const y=new Date(Date.now()-DAY).toDateString();
  game.streak = (game.lastDay===y)? game.streak+1 : 1;
  game.best=Math.max(game.best,game.streak);
  game.lastDay=today; saveGame();
  if(game.streak>1) toast(`🔥 ${game.streak} Tage in Folge!`, true);
}
function addXP(n){
  const before=gameLevel();
  game.xp+=n; saveGame();
  const after=gameLevel();
  if(after>before){ toast(`⬆️ Level ${after} · ${LEVEL_NAMES[after]}!`, true); confetti(); buzz([20,40,20]); }
}
const BADGES=[
  {id:'first',   ic:'🐣', t:'Erster Vogel',    d:'Den ersten Vogel angelegt',          ok:()=>state.birds.length>=1},
  {id:'ten',     ic:'🪺', t:'Volles Nest',     d:'10 Vögel in der Sammlung',           ok:()=>state.birds.length>=10},
  {id:'master1', ic:'🥇', t:'Gemeistert',      d:'Ersten Vogel in Box 5 gebracht',     ok:()=>state.birds.some(b=>b.box===5)},
  {id:'master5', ic:'🏆', t:'Meistersammler',  d:'5 Vögel gemeistert',                 ok:()=>state.birds.filter(b=>b.box===5).length>=5},
  {id:'streak3', ic:'🔥', t:'Dranbleiber',     d:'3 Tage in Folge gelernt',            ok:()=>game.best>=3},
  {id:'streak7', ic:'☀️', t:'Wochenchor',      d:'7 Tage in Folge gelernt',            ok:()=>game.best>=7},
  {id:'combo5',  ic:'⚡', t:'Im Flow',          d:'5 richtige in Serie',                ok:()=>game.maxCombo>=5},
  {id:'sess10',  ic:'🎓', t:'Fleißig',         d:'10 Lerneinheiten abgeschlossen',     ok:()=>game.sessions>=10},
  {id:'lvl5',    ic:'🕊️', t:'Singvogel',       d:'Level 5 erreicht',                   ok:()=>gameLevel()>=5},
];
function checkBadges(){
  let won=null;
  for(const b of BADGES){ if(!game.badges.includes(b.id) && b.ok()){ game.badges.push(b.id); won=b; } }
  if(won){ saveGame(); toast(`${won.ic} Abzeichen: ${won.t}!`, true); buzz([15,30,15]); }
}
function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }
function confetti(){
  const colors=['#2E6B4A','#CE9233','#5E9E72','#BC4F36','#3B8A59','#F4E6C9'];
  const c=document.createElement('div'); c.className='confetti';
  for(let i=0;i<46;i++){ const s=document.createElement('i');
    s.style.left=(Math.random()*100)+'vw';
    s.style.background=colors[(Math.random()*colors.length)|0];
    s.style.animationDuration=(1.4+Math.random()*1.4)+'s';
    s.style.animationDelay=(Math.random()*.4)+'s';
    s.style.transform=`rotate(${Math.random()*360}deg)`;
    c.appendChild(s); }
  document.body.appendChild(c); setTimeout(()=>c.remove(),3200);
}
function comboPop(n){
  const el=document.createElement('div'); el.className='combo-pop';
  el.textContent = n>=5? `⚡ ${n}er-Serie!` : `${n} in Folge!`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
}

/* ============================================================
   6. AUDIO + SPECTROGRAM
   ============================================================ */
const player = $('#player');
let spectroTimer=null, spectroEls=[];
function registerSpectro(container){ spectroEls = $$('i',container); }
function animateSpectro(on){
  cancelAnimationFrame(spectroTimer);
  const cont = spectroEls[0]?.parentElement;
  if(cont) cont.classList.toggle('idle', !on);
  if(!on){ spectroEls.forEach(b=>b.style.height='16%'); return; }
  let t=0;
  const tick=()=>{
    t+=0.18;
    spectroEls.forEach((b,i)=>{
      const v = 0.28 + 0.36*Math.abs(Math.sin(t+i*0.55)) + 0.32*Math.random();
      b.style.height = Math.min(100, v*100)+'%';
    });
    spectroTimer=requestAnimationFrame(tick);
  };
  tick();
}
function playUrl(url){
  if(!url){ toast('Für diesen Vogel ist noch kein Laut gespeichert.'); return; }
  if(!player.paused && player.dataset.src===url){ player.pause(); return; }
  player.src=url; player.dataset.src=url;
  player.play().catch(()=>toast('Laut konnte nicht abgespielt werden.'));
}
function autoplay(url){
  if(!url) return;
  player.src=url; player.dataset.src=url;
  player.play().catch(()=>{}); // stiller Autostart, Browser-Policy schluckt evtl.
}
player.addEventListener('play', ()=>animateSpectro(true));
player.addEventListener('pause',()=>animateSpectro(false));
player.addEventListener('ended',()=>animateSpectro(false));
function stopAudio(){ try{player.pause(); player.currentTime=0;}catch(e){} }

async function addCandidate(i){
  const c = (state._lastResults||[])[i]; if(!c){ toast('Treffer nicht mehr verfügbar.'); return; }
  const btn=$(`#res${i} .btn`); if(btn){btn.disabled=true; btn.innerHTML='<span class="spin"></span>';}
  try{
    // Check shared server cache first — skip expensive API enrichment if already cached
    const name = c.title || c.de || '';
    const cached = name ? await fetchCachedBirds([name]) : new Map();
    const profile = cached.get(name.toLowerCase());
    let b;
    if(profile && profile.de){
      b = birdFromCache(profile);
    } else {
      b = await enrichBird(c);
      cacheBirdProfiles([b]); // store in server cache for others
    }
    await DB.put('birds',b); state.birds.push(b);
    toast(`„${b.de}" hinzugefügt${b.sounds.length?` · ${b.sounds.length} Stimmen`:''}.`);
    if(btn){btn.outerHTML='<span class="pill" style="background:var(--primary-soft);color:var(--primary-2);border-color:var(--primary)">✓ Im Kasten</span>';}
  }catch(e){ toast('Konnte nicht hinzugefügt werden.'); if(btn){btn.disabled=false;btn.textContent='+ Hinzufügen';} }
}

async function enrichFirstSpecies(cands){
  for(const c of cands.slice(0,3)){
    const b=await enrichBird(c);
    if(b.la) return b;
  }
  return cands[0] ? enrichBird(cands[0]) : null;
}
async function loadExamples(){
  toast('Lade Beispielvögel…');
  let added=0; const addedIds=[];

  // Determine which birds we still need
  const needed = [];
  for(const name of EXAMPLES){
    const exist=state.birds.find(b=>b.de.toLowerCase()===name.toLowerCase());
    if(exist){ addedIds.push(exist.id); }
    else { needed.push(name); }
  }

  // Batch-fetch from cache first
  const cached = await fetchCachedBirds(needed);
  const uncached = [];
  for(const name of needed){
    const profile = cached.get(name.toLowerCase());
    if(profile){
      const b = birdFromCache(profile);
      await DB.put('birds',b); state.birds.push(b); addedIds.push(b.id); added++;
    } else {
      uncached.push(name);
    }
  }

  // For uncached birds: add as pending placeholders immediately, enrich in background
  const pendingBirds = [];
  for(const name of uncached){
    const b = birdPending(name);
    await DB.put('birds',b); state.birds.push(b); addedIds.push(b.id); added++;
    pendingBirds.push(b);
  }

  if(added){
    // optional als Set bündeln
    const s={id:uid(),name:'Gartenvögel',description:'Beispiel-Set',birdIds:addedIds,created:Date.now()};
    await DB.put('sets',s); state.sets.push(s);
    if(pendingBirds.length){
      toast(`🐦 ${added} Vögel + Set „Gartenvögel" geladen. ${pendingBirds.length} ${pendingBirds.length===1?'Vogel wird':'Vögel werden'} noch angereichert…`, true);
    } else {
      toast(`${added} Vögel + Set „Gartenvögel" geladen.`, true);
    }
  }
  setView('dashboard');

  // Enrich pending birds in background
  if(pendingBirds.length) enqueueEnrichment(pendingBirds);
}
async function loadBirdList(listName){
  const birds=BIRD_LISTS[listName]; if(!birds)return;
  toast(`Lade „${listName}"…`);
  let added=0; const addedIds=[];

  // Determine which birds we still need (not already in collection)
  const needed = [];
  for(const name of birds){
    const exist=state.birds.find(b=>b.de.toLowerCase()===name.toLowerCase());
    if(exist){ addedIds.push(exist.id); }
    else { needed.push(name); }
  }

  // Batch-fetch from cache first → avoids dozens of API calls
  const cached = await fetchCachedBirds(needed);
  const uncached = [];
  for(const name of needed){
    const profile = cached.get(name.toLowerCase());
    if(profile){
      const b = birdFromCache(profile);
      await DB.put('birds',b); state.birds.push(b); addedIds.push(b.id); added++;
    } else {
      uncached.push(name);
    }
  }

  // For uncached birds: add as pending placeholders, enrich in background
  const pendingBirds = [];
  for(const name of uncached){
    const b = birdPending(name);
    await DB.put('birds',b); state.birds.push(b); addedIds.push(b.id); added++;
    pendingBirds.push(b);
  }

  if(addedIds.length){
    const existing=state.sets.find(s=>s.name===listName);
    if(existing){ existing.birdIds=[...new Set([...existing.birdIds,...addedIds])]; await DB.put('sets',existing); }
    else { const s={id:uid(),name:listName,description:`Vorgefertigte Liste`,birdIds:addedIds,created:Date.now()}; await DB.put('sets',s); state.sets.push(s); }
    if(pendingBirds.length){
      toast(`${added?added+' neue Vögel + ':''}Set „${listName}" geladen. ${pendingBirds.length} ${pendingBirds.length===1?'Vogel wird':'Vögel werden'} noch angereichert…`, true);
    } else {
      toast(`${added?added+' neue Vögel + ':''}Set „${listName}" geladen.`, true);
    }
  }
  setView('dashboard');

  // Enrich pending birds in background
  if(pendingBirds.length) enqueueEnrichment(pendingBirds);
}

let _carouselIdx=0;
function carouselNav(dir){
  const c=$('#birdCarousel'); if(!c)return;
  const imgs=c.querySelectorAll('img');
  const dots=c.querySelectorAll('.dots i');
  if(imgs.length<=1)return;
  imgs[_carouselIdx].classList.remove('active');
  if(dots[_carouselIdx])dots[_carouselIdx].classList.remove('active');
  _carouselIdx=(_carouselIdx+dir+imgs.length)%imgs.length;
  imgs[_carouselIdx].classList.add('active');
  if(dots[_carouselIdx])dots[_carouselIdx].classList.add('active');
}
async function fetchBirdImages(b, limit=3){
  if(!b.la)return [];
  try{
    const data=await px('wiki',{
      action:'query', generator:'images', titles:b.la,
      gimlimit: Math.min(limit+2, 10), prop:'imageinfo', iiprop:'url', iiurlwidth:520
    });
    const pages=(data?.query?.pages) ? Object.values(data.query.pages) : [];
    const imgs=pages
      .filter(p=>p.imageinfo&&p.imageinfo[0]&&/\.(jpg|jpeg|png|webp)/i.test(p.title||''))
      .map(p=>p.imageinfo[0].thumburl||p.imageinfo[0].url)
      .filter(Boolean);
    if(b.image&&!imgs.includes(b.image)) imgs.unshift(b.image);
    return imgs.slice(0, limit);
  }catch(e){return [];}
}

let communityOk=null; // null=unbekannt, false=nicht konfiguriert/erreichbar
async function cx(action, params={}, body=null){
  const u=new URL('/api/community', location.origin);
  u.searchParams.set('action', action);
  for(const [k,v] of Object.entries(params)) u.searchParams.set(k,v);
  const r=await fetch(u, body? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)} : undefined);
  const j=await r.json().catch(()=>({}));
  if(r.status===503 && j.setup){ communityOk=false; throw new Error('setup'); }
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  communityOk=true;
  return j;
}

async function importSharedSet(code){
  code=String(code||'').trim().toUpperCase();
  if(!code){ toast('Bitte einen Set-Code eingeben.'); return; }
  try{
    const {set}=await cx('set',{code});
    let added=0;
    const ids=[];
    for(const x of set.birds){
      let b=state.birds.find(o=>o.de.toLowerCase()===x.de.toLowerCase());
      if(!b){
        b={id:uid(),de:x.de,la:x.la||null,en:x.en||null,image:x.image||null,
          sounds:x.sound?[{id:'shared',url:x.sound,type:'',q:'',loc:'',rec:'',length:''}]:[],
          wiki:null,box:1,due:0,correct:0,wrong:0,lastReviewed:0,created:Date.now()};
        await DB.put('birds',b); state.birds.push(b); added++;
      }
      ids.push(b.id);
    }
    const local={id:uid(),name:set.name,description:`von ${set.author} (Community)`,birdIds:ids,created:Date.now()};
    await DB.put('sets',local); state.sets.push(local);
    checkBadges();
    toast(`„${set.name}“ importiert – ${added} neue Vögel.`, true); confetti();
    setView('sets');
  }catch(e){ toast(communityOk===false?'Community-Backend nicht konfiguriert (siehe README).':'Import fehlgeschlagen: '+e.message); }
}

   9. STUDY ENGINE — 4 Lernspiele + Leitner

let study=null;

function startStudyPick(setId){
  const set = setId? state.sets.find(s=>s.id===setId) : null;
  const scopeBirds = (set? set.birdIds.map(birdById).filter(Boolean) : state.birds).filter(b=>!b.pending);

  $$('#nav button').forEach(b=>b.classList.remove('active'));
  // Modus wählen
  const enoughForMC = scopeBirds.length>=4;
  const haveSounds = scopeBirds.some(b=>b.sounds&&b.sounds.length);
  view.innerHTML=`
    <div class="study">
      <div class="spread" style="margin:10px 0 18px">
        <div><div class="eyebrow">Lernen${set?' · '+esc(set.name):''}</div>
          <h1 style="font-size:30px;margin-top:6px">Wähl ein Spiel</h1></div>
        <button class="btn ghost sm" onclick="setView('dashboard')">Zurück</button>
      </div>
      <div class="modeselect">
        <button class="mode" onclick="beginStudy('${setId||''}','flip')">
          <span class="mi">🃏</span><div class="mt">Karteikarte</div>
          <div class="md">Bild & Stimme, Namen selbst raten, dann umdrehen und bewerten.</div></button>
        <button class="mode" onclick="beginStudy('${setId||''}','mc')" ${enoughForMC?'':'style="opacity:.5;pointer-events:none"'}>
          <span class="mi">🔤</span><div class="mt">Multiple Choice</div>
          <div class="md">Bild & Stimme sehen, aus vier Namen den richtigen wählen.${enoughForMC?'':' (ab 4 Vögeln)'}</div></button>
        <button class="mode" onclick="beginStudy('${setId||''}','listen')" ${(enoughForMC&&haveSounds)?'':'style="opacity:.5;pointer-events:none"'}>
          <span class="mi">🎧</span><div class="mt">Hörquiz</div>
          <div class="md">Nur die Stimme – ohne Bild – dem richtigen Namen zuordnen.${(enoughForMC&&haveSounds)?'':' (braucht Stimmen)'}</div></button>
        <button class="mode" onclick="beginStudy('${setId||''}','type')">
          <span class="mi">⌨️</span><div class="mt">Tippen</div>
          <div class="md">Bild & Stimme, den deutschen Namen eintippen.</div></button>
      </div>
      <p class="faint" style="font-size:13px;margin-top:18px">Richtig → der Vogel wandert eine Box weiter. Falsch → zurück in Box&nbsp;1.</p>
    </div>`;
}

function beginStudy(setId, mode){
  const set = setId? state.sets.find(s=>s.id===setId) : null;
  const scope = (set? set.birdIds.map(birdById).filter(Boolean) : state.birds).filter(b=>!b.pending);
  let queue = scope.filter(isDue);
  let freeMode=false;
  if(queue.length===0){ queue=[...scope]; freeMode=true; } // nichts fällig → freies Üben
  // mischen
  for(let i=queue.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[queue[i],queue[j]]=[queue[j],queue[i]];}
  study={set,scope,mode,queue,freeMode,total:queue.length,done:0,right:0,results:[],xp:0};
  game.combo=0;
  nextQuestion();
}

function nextQuestion(){
  stopAudio();
  if(study.queue.length===0) return endStudy();
  const b=study.queue[0];
  const denom = study.done + study.queue.length;
  const pct = denom? Math.round(study.done/denom*100):0;
  const header=`
    <div class="progress">
      <button class="btn ghost sm" onclick="setView('dashboard')">✕</button>
      <div class="track"><i style="width:${pct}%"></i></div>
      <span class="lab">${study.done}/${denom}</span>
    </div>`;
  const m=study.mode;
  if(m==='flip') renderFlip(b,header);
  else if(m==='type') renderType(b,header);
  else renderMC(b,header,m==='listen'); // mc | listen
}

function distractors(b){
  const pool=study.scope.filter(x=>x.id!==b.id);
  for(let i=pool.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  const opts=[b,...pool.slice(0,3)];
  for(let i=opts.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[opts[i],opts[j]]=[opts[j],opts[i]];}
  return opts;
}
const soundOf=b=> (b.sounds&&b.sounds[0])?b.sounds[0].url:null;

function renderMC(b,header,listen){
  const opts=distractors(b);
  view.innerHTML=`<div class="study">${header}
    <div class="qcard card">
      ${listen
        ? `<div class="qimg hidden">Nur Hören — welcher Vogel ist das?</div>`
        : (b.image?`<img class="qimg" src="${esc(b.image)}" alt="">`:`<div class="qimg hidden">Kein Bild</div>`)}
      <div class="player" style="justify-content:center">
        <button class="playbtn" id="qplay">▶</button>
        <div class="spectro" id="spectro" style="max-width:240px">${'<i></i>'.repeat(20)}</div>
      </div>
      <div class="choices" id="choices">
        ${opts.map((o,i)=>`<button class="choice" data-id="${o.id}"><span class="num">${i+1}</span>${esc(o.de)}</button>`).join('')}
      </div>
      <div class="fb" id="fb"></div>
    </div></div>`;
  registerSpectro($('#spectro'));
  const url=soundOf(b);
  $('#qplay').onclick=()=>playUrl(url);
  autoplay(url); // automatisch anspielen
  $$('#choices .choice').forEach(btn=>btn.onclick=()=>answerMC(btn,b));
  study._keys=opts;
}
function answerMC(btn,b){
  if(study._answered) return; study._answered=true;
  const correct = btn.dataset.id===b.id;
  $$('#choices .choice').forEach(x=>{ x.style.pointerEvents='none';
    if(x.dataset.id===b.id) x.classList.add('correct');
    else if(x===btn) x.classList.add('wrong'); });
  if(study.mode==='listen' && b.image){ const im=$('.qimg'); if(im){ im.outerHTML=`<img class="qimg" src="${esc(b.image)}" style="margin-top:8px">`; } }
  const fb=$('#fb'); fb.className='fb '+(correct?'ok':'no'); fb.textContent=correct?'Richtig!':`Das war: ${b.de}`;
  finishCard(b,correct);
}

function renderType(b,header){
  view.innerHTML=`<div class="study">${header}
    <div class="qcard card">
      ${b.image?`<img class="qimg" src="${esc(b.image)}" alt="">`:`<div class="qimg hidden">Kein Bild</div>`}
      <div class="player" style="justify-content:center;margin-bottom:8px">
        <button class="playbtn" id="qplay">▶</button>
        <div class="spectro" id="spectro" style="max-width:240px">${'<i></i>'.repeat(20)}</div>
      </div>
      <input class="input" id="typein" placeholder="Deutscher Name…" autocomplete="off" style="text-align:center;font-family:var(--display);font-size:18px">
      <div class="fb" id="fb"></div>
      <button class="btn" id="typecheck" style="width:100%;margin-top:8px">Prüfen</button>
    </div></div>`;
  registerSpectro($('#spectro'));
  const url=soundOf(b); $('#qplay').onclick=()=>playUrl(url); autoplay(url);
  const inp=$('#typein'); inp.focus();
  const check=()=>{
    if(study._answered) return; study._answered=true;
    const norm=s=>s.toLowerCase().replace(/[\s\-]/g,'').replace(/ß/g,'ss');
    const correct = lev(norm(inp.value),norm(b.de))<=1;
    inp.style.borderColor = correct?'var(--primary)':'var(--robin)';
    const fb=$('#fb'); fb.className='fb '+(correct?'ok':'no'); fb.textContent=correct?'Richtig!':`Richtig wäre: ${b.de}`;
    $('#typecheck').textContent='Weiter'; $('#typecheck').onclick=()=>{ study._answered=false; advance(b,correct); };
    finishCard(b,correct,true);
  };
  $('#typecheck').onclick=check;
  inp.onkeydown=e=>{ if(e.key==='Enter') check(); };
}
// Levenshtein für Tipp-Toleranz
function lev(a,b){const m=a.length,n=b.length;const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}

function renderFlip(b,header){
  view.innerHTML=`<div class="study">${header}
    <div class="qcard card">
      ${b.image?`<img class="qimg" src="${esc(b.image)}" alt="">`:`<div class="qimg hidden">Kein Bild</div>`}

  $('#g_yes').onclick=()=>{ finishCard(b,true); setTimeout(()=>advance(b,true),300); };
  $('#g_no').onclick =()=>{ finishCard(b,false); setTimeout(()=>advance(b,false),300); };
}

// gemeinsame Bewertung: Box updaten, speichern, XP & Combo, ggf. weiter
async function finishCard(b,correct,manualAdvance=false){
  const res=grade(b,correct);
  await DB.put('birds',b);
  study.done++; if(correct)study.right++;
  study.results.push({de:b.de,correct,box:b.box});
  touchStreak();
  if(correct){
    game.combo++; game.maxCombo=Math.max(game.maxCombo,game.combo); buzz(12);
    let xp = 10 + Math.min(10, (game.combo-1)*2); // Combo-Bonus
    if(game.combo>=2) comboPop(game.combo);
    study.xp=(study.xp||0)+xp; addXP(xp);
  } else {
    game.combo=0; buzz([40,30,40]);
    const card=$('.qcard'); if(card){ card.classList.add('shake'); setTimeout(()=>card.classList.remove('shake'),450); }
  }
  if(res.mastered){ toast(`🥇 „${b.de}“ gemeistert!`, true); confetti(); }
  checkBadges();
  if(!manualAdvance && (study.mode==='mc'||study.mode==='listen')){
    if(correct){
      setTimeout(()=>advance(b,correct), 1050);
    } else {
      // Bei Fehler: "Nächste"-Button anzeigen statt auto-advance
      const fb=$('#fb');
      if(fb&&!fb.querySelector('.nextbtn')){
        const nbtn=document.createElement('button');
        nbtn.className='nextbtn'; nbtn.textContent='Nächste →';
        nbtn.onclick=()=>advance(b,correct);
        fb.appendChild(nbtn);
      }
    }
  }
}
function advance(b,correct){
  study._answered=false;
  study.queue.shift();
  // Falsch beantwortete im freien/fälligen Lauf nochmal hinten anstellen
  if(!correct){ const copy=birdById(b.id); if(copy){ const pos=Math.min(study.queue.length, 2+ (Math.random()*2|0)); study.queue.splice(pos,0,copy);} }
  nextQuestion();
}

function endStudy(){
  stopAudio();
  const acc=study.total? Math.round(study.right/study.results.length*100):0;
  game.sessions++; saveGame(); checkBadges();
  const bonus=15; addXP(bonus); // Abschluss-Bonus
  const earned=(study.xp||0)+bonus;
  if(acc>=80) confetti();
  view.innerHTML=`<div class="study"><div class="endcard card">
    <div class="eyebrow">${study.set?esc(study.set.name):'Lerneinheit'}${study.freeMode?' · freies Üben':''}</div>
    <div class="big" style="margin-top:8px">${acc}%</div>
    <div class="muted" style="margin-top:4px">${study.right} von ${study.results.length} richtig</div>
    <div class="row" style="justify-content:center;margin-top:14px">
      <span class="statpill lvl">+${earned} XP</span>
      <span class="statpill flame">🔥 ${game.streak} ${game.streak===1?'Tag':'Tage'}</span>
    </div>
    <p class="fb ok" style="font-size:16px">${ acc>=90?'Stark! Die meisten wandern eine Box weiter. 🪶' : acc>=60?'Gut gemacht – dranbleiben lohnt sich.' : 'Übung macht den Vogelkenner. 🐦' }</p>
    <div class="row" style="justify-content:center;margin-top:18px">
      <button class="btn" onclick="startStudyPick('${study.set?study.set.id:''}')">Nochmal</button>
      <button class="btn ghost" onclick="setView('dashboard')">Fertig</button>
    </div>
  </div></div>`;
  study=null;
}

/* Tastatur im Study */
document.addEventListener('keydown',e=>{
  if(state.view!=='study'||!study)return;
  if(e.key===' '){ const p=$('#qplay'); if(p){e.preventDefault();p.click();} }
  if((study.mode==='mc'||study.mode==='listen')&&!study._answered&&/^[1-4]$/.test(e.key)){
    const btn=$$('#choices .choice')[+e.key-1]; if(btn)btn.click();
  }
  // Enter/Space advances after wrong answer
  if(study._answered&&(e.key==='Enter'||e.key===' ')){
    const nb=document.querySelector('.nextbtn'); if(nb){e.preventDefault();nb.click();}
  }
});

/* ============================================================
   10. INIT
   ============================================================ */
$('#nav').addEventListener('click',e=>{const b=e.target.closest('button'); if(b)setView(b.dataset.view);});
$('#cta-study').onclick=()=>startStudyPick(null);

(async function init(){
  try{ await DB.open(); await loadAll(); }
  catch(e){ console.error(e); }
  render();
  pingBackend().then(ok=>{ if(ok){ autoSyncSounds(); } repairBirds(); }); // Stimmen & Korrekturen im Hintergrund
})();
window.setView=setView; // für inline-onclick
window.loadBirdList=loadBirdList;
window.carouselNav=carouselNav;
</script>
</body>
</html>
